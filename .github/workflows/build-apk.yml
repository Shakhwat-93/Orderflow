name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: npm install --force > npm_install.log 2>&1 || true

    - name: Build Web App
      env:
        CI: false
      run: npm run build > npm_build.log 2>&1 || true

    - name: Sync Capacitor (Copy Assets)
      run: npx cap copy android > cap_sync.log 2>&1 || true

    - name: Build APK
      working-directory: ./android
      run: |
        sed -i -e 's/\r$//' gradlew || true
        chmod +x ./gradlew || true
        ./gradlew assembleDebug --stacktrace > ../gradle_build.log 2>&1 || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OrderFlow-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Debug Logs
      uses: actions/upload-artifact@v4
      with:
        name: Debug-Logs
        path: |
          npm_install.log
          npm_build.log
          cap_sync.log
          gradle_build.log
